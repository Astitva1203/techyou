<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="100%" height="100%">
  <defs>
    <linearGradient id="ty-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00f2ff" />
      <stop offset="100%" stop-color="#ff00ff" />
    </linearGradient>
    <radialGradient id="bg-grad" cx="50%" cy="50%" r="50%" fx="50%" fy="50%">
      <stop offset="0%" stop-color="#1a1c3a" />
      <stop offset="100%" stop-color="#050505" />
    </radialGradient>
    <filter id="ty-glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="15" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>
  <rect width="400" height="400" fill="url(#bg-grad)" />
  <text x="200" y="220" font-family="sans-serif" font-weight="900" font-size="160" fill="url(#ty-grad)" text-anchor="middle" filter="url(#ty-glow)" letter-spacing="-5">TY</text>
  <text x="200" y="320" font-family="sans-serif" font-weight="bold" font-size="50" fill="#ffffff" text-anchor="middle" letter-spacing="2">TECH YOU</text>
</svg>
